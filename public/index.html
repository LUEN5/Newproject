<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>多人协作编辑器</title>
    <link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <aside class="sidebar">
        <h2>文档列表</h2>
        <div class="create-row">
          <input id="titleInput" placeholder="输入新文档标题" />
          <button id="createBtn">新建</button>
        </div>
        <ul id="docList" class="doc-list"></ul>
      </aside>

      <section class="container">
        <header>
          <h1 id="docTitle">多人文本编辑（类 Google Docs）</h1>
          <div class="meta">
            <label for="username">昵称：</label>
            <input id="username" placeholder="输入你的昵称" />
            <span id="status" class="status">连接中...</span>
          </div>
          <div id="participants" class="participants"></div>
        </header>

        <section class="editor-panel">
          <div id="toolbar">
            <span class="ql-formats">
              <select class="ql-header"></select>
              <button class="ql-bold"></button>
              <button class="ql-italic"></button>
              <button class="ql-underline"></button>
            </span>
            <span class="ql-formats">
              <button class="ql-list" value="ordered"></button>
              <button class="ql-list" value="bullet"></button>
              <button class="ql-link"></button>
            </span>
          </div>
          <div id="editor"></div>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
